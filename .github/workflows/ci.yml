name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=75 -v

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --exclude=venv,__pycache__

      - name: Check code formatting with black
        run: |
          pip install black
          black --check --diff .

      - name: Security scan with bandit
        run: |
          pip install bandit
          bandit -r app.py -ll

      - name: Check for dependency vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-flask-app:${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d -p 5000:5000 --name test-container my-flask-app:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/health
          docker stop test-container

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error

      - name: Wait for deployment
        run: sleep 30

      - name: Verify live deployment
        run: |
          curl --fail https://my-flask-app-9oaw.onrender.com/health
